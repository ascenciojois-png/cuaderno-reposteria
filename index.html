<script>
  // Red de seguridad: si algo falla al cargar los módulos (React, Babel,
  // lucide-react, o un error dentro de la app) mostramos un mensaje claro
  // en pantalla en vez de dejar la pantalla en blanco, y lo dejamos también
  // en la consola para depurar.
  function mostrarErrorFatal(mensaje, detalle) {
    var root = document.getElementById("root");
    if (!root) return;
    root.innerHTML =
      '<div style="max-width:560px;margin:60px auto;padding:24px;font-family:sans-serif;' +
      'text-align:center;color:#3F2E2E;">' +
      '<h2 style="color:#8C4A4E;margin-bottom:8px;">No se pudo cargar la app</h2>' +
      '<p style="color:#8A7370;font-size:14px;line-height:1.5;">' + mensaje + '</p>' +
      (detalle
        ? '<pre style="text-align:left;background:#F6E3E2;color:#8C4A4E;padding:12px;border-radius:8px;' +
          'font-size:12px;overflow:auto;margin-top:14px;">' + detalle + '</pre>'
        : "") +
      '<button onclick="location.reload()" style="margin-top:14px;padding:10px 18px;border:none;' +
      'border-radius:8px;background:#8C4A4E;color:white;font-weight:600;cursor:pointer;">Reintentar</button>' +
      "</div>";
  }
  window.addEventListener("error", function (e) {
    mostrarErrorFatal(
      "Ocurrió un error al cargar la aplicación (posiblemente al descargar React, Babel o los íconos desde su CDN). Revisa tu conexión a internet e inténtalo de nuevo.",
      (e && (e.message || (e.error && e.error.message))) || ""
    );
  });
  window.addEventListener("unhandledrejection", function (e) {
    mostrarErrorFatal(
      "Ocurrió un error al cargar la aplicación.",
      (e && e.reason && (e.reason.message || String(e.reason))) || ""
    );
  });
</script>

  { name: "Keke de Naranja-Vainilla", baseLabel: "Masa total deseada", targetMass: 3000,

  { name: "Croissant de Hojaldre", baseLabel: "Cantidad de harina", targetMass: 1200,

  { name: "Rosquita", baseLabel: "Cantidad de harina", targetMass: 2000,

function buildStarterRecipes() {
  const base = RAW_RECIPES.map((r, idx) => ({
    id: uid(), name: r.name, baseLabel: r.baseLabel, targetMass: r.targetMass,
    basedOn: "", variantNotes: "",
    color: TAG_COLORS[idx % TAG_COLORS.length],
    ingredients: r.ingredients.map(([n, p]) => ing(n, p)),
  }));

  const novioFamily = [
    { name: "Keke de Novia - Vainilla", basedOn: "Base propia (pendiente de tus cantidades)",
      variantNotes: "Es la base de toda la familia 'Keke de Novia'. Completa aquí los ingredientes y porcentajes reales; las otras dos recetas se arman a partir de esta." },
    { name: "Keke de Novia - Naranja", basedOn: "Keke de Novia - Vainilla",
      variantNotes: "Igual a la receta de Vainilla, cambiando solo la Leche y el Agua por Jugo de Naranja (mismo % total que tenían Leche+Agua)." },
    { name: "Keke de Novia - Marmoleado", basedOn: "Keke de Novia - Vainilla",

  ].map((r, idx) => ({
    id: uid(), name: r.name, baseLabel: "Masa total deseada (pendiente)", targetMass: 0,
    basedOn: r.basedOn, variantNotes: r.variantNotes,
    color: TAG_COLORS[(idx + base.length) % TAG_COLORS.length],
    ingredients: [],
  }));

  return [...base, ...novioFamily];
}

const STARTER_RECIPES = buildStarterRecipes();
const STARTER_INVENTORY = [
  { id: uid(), name: "Harina", stock: 5000, min: 1000 },
  { id: uid(), name: "Azúcar", stock: 3000, min: 500 },
  { id: uid(), name: "Cocoa", stock: 300, min: 100 },
  { id: uid(), name: "Tinte Rojo", stock: 50, min: 20 },
  { id: uid(), name: "Manteca", stock: 1000, min: 300 },
];
const STARTER_MOLDS = [{ id: uid(), diametro: 14, gramos: 550 }];

// ---------- Almacenamiento local (localStorage) ----------
function useLocalStorage(key, fallback) {
  const [value, setValue] = useState(() => {
    try {
      const raw = window.localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    } catch (e) {
      return fallback;
    }
  });

  const persist = useCallback((next) => {
    setValue(next);
    try {
      window.localStorage.setItem(key, JSON.stringify(next));
    } catch (e) {
      console.error("No se pudo guardar", key, e);
    }
  }, [key]);

  return [value, persist, true];
}

function App() {
  const [recipes, setRecipes] = useLocalStorage("recipes_v3", STARTER_RECIPES);
  const [inventory, setInventory] = useLocalStorage("inventory", STARTER_INVENTORY);
  const [whatsapp, setWhatsapp] = useLocalStorage("whatsapp_number", "");
  const [molds, setMolds] = useLocalStorage("mold_sizes", STARTER_MOLDS);
  const [apiKey, setApiKey] = useLocalStorage("claude_api_key", "");
  const [tab, setTab] = useState("recetas");
  const [activeRecipeId, setActiveRecipeId] = useState(null);
  const [photoMode, setPhotoMode] = useState(null);

  useEffect(() => {
    if (recipes.length && !activeRecipeId) setActiveRecipeId(recipes[0].id);
  }, [recipes, activeRecipeId]);

  useEffect(() => {
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js").catch(() => {});
    }
  }, []);

  const lowStockItems = useMemo(
    () => inventory.filter((i) => Number(i.stock) <= Number(i.min)),
    [inventory]
  );

  const activeRecipe = recipes.find((r) => r.id === activeRecipeId) || null;

  function updateRecipe(id, patch) { setRecipes(recipes.map((r) => (r.id === id ? { ...r, ...patch } : r))); }
  function updateIngredient(recipeId, ingId, patch) {
    setRecipes(recipes.map((r) => r.id !== recipeId ? r : {
      ...r, ingredients: r.ingredients.map((i) => (i.id === ingId ? { ...i, ...patch } : i))
    }));
  }
  function addIngredient(recipeId) {
    setRecipes(recipes.map((r) => r.id !== recipeId ? r : {
      ...r, ingredients: [...r.ingredients, { id: uid(), name: "Nuevo insumo", percent: 0 }]
    }));
  }
  function removeIngredient(recipeId, ingId) {
    setRecipes(recipes.map((r) => r.id !== recipeId ? r : {
      ...r, ingredients: r.ingredients.filter((i) => i.id !== ingId)
    }));
  }
  function addRecipe(prefill) {
    const fresh = {
      id: uid(), name: prefill?.name || "Nueva receta",
      baseLabel: prefill?.baseLabel || "Masa total deseada",
      targetMass: prefill?.targetMass || 1000,
      basedOn: "", variantNotes: "",
      color: TAG_COLORS[recipes.length % TAG_COLORS.length],
      ingredients: (prefill?.ingredients || []).map((i) => ing(i.name, Number(i.percent) || 0)),
    };
    setRecipes([...recipes, fresh]);
    setActiveRecipeId(fresh.id);
    setTab("recetas");
    return fresh;
  }
  function removeRecipe(id) {
    const next = recipes.filter((r) => r.id !== id);
    setRecipes(next);
    if (activeRecipeId === id) setActiveRecipeId(next[0]?.id ?? null);
  }
  function addInventoryItem() { setInventory([...inventory, { id: uid(), name: "Nuevo insumo", stock: 0, min: 0 }]); }
  function updateInventoryItem(id, patch) { setInventory(inventory.map((i) => (i.id === id ? { ...i, ...patch } : i))); }
  function removeInventoryItem(id) { setInventory(inventory.filter((i) => i.id !== id)); }
  function addMoldRow(prefill) { setMolds([...molds, { id: uid(), diametro: prefill?.diametro || 0, gramos: prefill?.gramos || 0 }]); }
  function updateMold(id, patch) { setMolds(molds.map((m) => (m.id === id ? { ...m, ...patch } : m))); }
  function removeMold(id) { setMolds(molds.filter((m) => m.id !== id)); }
  function addMoldsBulk(list) {
    const rows = list.map((m) => ({ id: uid(), diametro: Number(m.diametro) || 0, gramos: Number(m.gramos) || 0 }));
    setMolds([...molds, ...rows]);
  }

  const totalPercent = activeRecipe
    ? round2(activeRecipe.ingredients.reduce((s, i) => s + Number(i.percent || 0), 0))
    : 0;

  const waMessage = useMemo(() => {
    if (lowStockItems.length === 0) return "";
    const lines = lowStockItems.map((i) => `• ${i.name}: quedan ${i.stock}g (mínimo ${i.min}g)`);
    return `Insumos por reponer:\n${lines.join("\n")}`;
  }, [lowStockItems]);

  function openWhatsApp() {
    const digits = (whatsapp || "").replace(/[^\d]/g, "");
    const text = encodeURIComponent(waMessage);
    const url = digits ? `https://wa.me/${digits}?text=${text}` : `https://wa.me/?text=${text}`;
    window.open(url, "_blank");
  }

  return (
    <div style={{ background: C.bg, minHeight: "100vh", fontFamily: "'Inter', system-ui, sans-serif", color: C.ink }}>
      <header style={{ padding: "28px 24px 20px", maxWidth: 1140, margin: "0 auto" }}>
        <div style={{ display: "flex", alignItems: "baseline", gap: 12, flexWrap: "wrap" }}>
          <h1 style={{ fontFamily: "'Fraunces', serif", fontWeight: 700, fontSize: 34, margin: 0, color: C.roseDeep, letterSpacing: "-0.01em" }}>
            Cuaderno de Repostería
          </h1>
          <span style={{ color: C.inkSoft, fontSize: 14 }}>tus recetas, moldes e insumos, en un solo lugar</span>
        </div>

        {lowStockItems.length > 0 && (
          <div style={{
            marginTop: 16, display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap",
            background: C.alertSoft, border: `1px solid ${C.alert}33`, color: C.alert,
            padding: "10px 16px", borderRadius: 12, fontSize: 14, fontWeight: 600
          }}>
            <AlertTriangle size={17} />
            {lowStockItems.length === 1 ? "1 insumo está por acabarse" : `${lowStockItems.length} insumos están por acabarse`}
            <button className="btn" onClick={() => setTab("inventario")} style={{
              background: C.alert, color: "white", border: "none", borderRadius: 8,
              padding: "6px 12px", fontSize: 13, fontWeight: 600, cursor: "pointer"
            }}>Ver inventario</button>
            <button className="btn" onClick={openWhatsApp} style={{
              marginLeft: whatsapp ? 0 : "auto", display: "flex", alignItems: "center", gap: 6,
              background: C.whatsapp, color: "white", border: "none", borderRadius: 8,
              padding: "6px 12px", fontSize: 13, fontWeight: 600, cursor: "pointer"
            }}><MessageCircle size={14} /> Enviar por WhatsApp</button>
          </div>
        )}

        <div style={{ marginTop: 22, display: "flex", gap: 6, borderBottom: `1px solid ${C.line}`, flexWrap: "wrap" }}>
          {[
            { id: "recetas", label: "Recetas", icon: ChefHat },
            { id: "moldes", label: "Moldes", icon: Ruler },
            { id: "inventario", label: "Inventario", icon: Package },
            { id: "config", label: "Configuración", icon: SettingsIcon },
          ].map(({ id, label, icon: Icon }) => (
            <button key={id} className="tab-btn" onClick={() => setTab(id)} style={{
              display: "flex", alignItems: "center", gap: 8, padding: "10px 18px",
              background: "transparent", border: "none", cursor: "pointer", fontSize: 15, fontWeight: 600,
              color: tab === id ? C.roseDeep : C.inkSoft,
              borderBottom: tab === id ? `2px solid ${C.roseDeep}` : "2px solid transparent",
            }}><Icon size={16} /> {label}</button>
          ))}
        </div>
      </header>

      <main style={{ maxWidth: 1140, margin: "0 auto", padding: "0 24px 60px" }}>
        {tab === "recetas" && (
          <RecetasView
            recipes={recipes} activeRecipe={activeRecipe} activeRecipeId={activeRecipeId}
            setActiveRecipeId={setActiveRecipeId} updateRecipe={updateRecipe}
            updateIngredient={updateIngredient} addIngredient={addIngredient}
            removeIngredient={removeIngredient} addRecipe={addRecipe} removeRecipe={removeRecipe}
            totalPercent={totalPercent} inventory={inventory} onOpenPhoto={() => setPhotoMode("receta")}
          />
        )}
        {tab === "moldes" && (
          <MoldesView
            molds={molds} addMoldRow={addMoldRow} updateMold={updateMold} removeMold={removeMold}
            recipes={recipes} updateRecipe={updateRecipe} onOpenPhoto={() => setPhotoMode("moldes")}
          />
        )}
        {tab === "inventario" && (
          <InventarioView
            inventory={inventory} addInventoryItem={addInventoryItem}
            updateInventoryItem={updateInventoryItem} removeInventoryItem={removeInventoryItem}
          />
        )}
        {tab === "config" && (
          <ConfiguracionView
            whatsapp={whatsapp} setWhatsapp={setWhatsapp}
            recipes={recipes} setRecipes={setRecipes}
            inventory={inventory} setInventory={setInventory}
            molds={molds} setMolds={setMolds}
            apiKey={apiKey} setApiKey={setApiKey}
          />
        )}
      </main>

      {photoMode && (
        <PhotoImportModal
          mode={photoMode}
          apiKey={apiKey}
          onGoToSettings={() => { setPhotoMode(null); setTab("config"); }}
          onClose={() => setPhotoMode(null)}
          onAddRecipe={(data) => { addRecipe(data); setPhotoMode(null); }}
          onAddMolds={(rows) => { addMoldsBulk(rows); setPhotoMode(null); setTab("moldes"); }}
        />
      )}
    </div>
  );
}

// =========================================================
// RECETAS

function RecetasView({
  recipes, activeRecipe, activeRecipeId, setActiveRecipeId, updateRecipe, updateIngredient,
  addIngredient, removeIngredient, addRecipe, removeRecipe, totalPercent, inventory, onOpenPhoto,
}) {
  return (
    <div style={{ display: "grid", gridTemplateColumns: "240px 1fr", gap: 24, marginTop: 24 }}>
      <aside>
        <div style={{ display: "flex", flexDirection: "column", gap: 6, maxHeight: "65vh", overflowY: "auto", paddingRight: 4 }}>
          {recipes.map((r) => (
            <button key={r.id} onClick={() => setActiveRecipeId(r.id)} className="rowhover" style={{
              display: "flex", alignItems: "center", gap: 9, textAlign: "left", padding: "9px 12px",
              borderRadius: 10, border: "none", cursor: "pointer", fontSize: 13.5, fontWeight: 600,
              background: activeRecipeId === r.id ? C.rose : "transparent",
              color: activeRecipeId === r.id ? "white" : C.ink,
            }}>
              <span style={{
                width: 10, height: 10, borderRadius: "50%", flexShrink: 0, background: r.color,
                border: activeRecipeId === r.id ? "1.5px solid white" : "none",
              }} />
              {r.name || "Sin nombre"}
            </button>
          ))}
        </div>
        <button className="btn" onClick={() => addRecipe()} style={{
          marginTop: 12, display: "flex", alignItems: "center", gap: 6, width: "100%", justifyContent: "center",
          padding: "10px 14px", borderRadius: 10, border: `1.5px dashed ${C.rose}`, background: "transparent",
          color: C.roseDeep, fontWeight: 600, fontSize: 14, cursor: "pointer",
        }}><Plus size={16} /> Nueva receta</button>
        <button className="btn" onClick={onOpenPhoto} style={{
          marginTop: 8, display: "flex", alignItems: "center", gap: 6, width: "100%", justifyContent: "center",
          padding: "10px 14px", borderRadius: 10, border: "none", background: C.roseDeep,
          color: "white", fontWeight: 600, fontSize: 14, cursor: "pointer",
        }}><Camera size={16} /> Agregar por foto</button>
      </aside>

      {activeRecipe ? (
        <RecipeDetail
          key={activeRecipe.id} recipe={activeRecipe} updateRecipe={updateRecipe}
          updateIngredient={updateIngredient} addIngredient={addIngredient}
          removeIngredient={removeIngredient} removeRecipe={removeRecipe}
          totalPercent={totalPercent} inventory={inventory}
        />
      ) : (
        <div style={{ color: C.inkSoft, padding: 40, textAlign: "center" }}>Crea una receta para empezar.</div>
      )}
    </div>
  );
}

function RecipeDetail({ recipe, updateRecipe, updateIngredient, addIngredient, removeIngredient, removeRecipe, totalPercent, inventory }) {
  const base = 100;
  const target = Number(recipe.targetMass || 0);
  const rows = recipe.ingredients.map((i) => {
    const grams = base > 0 ? round2((target / base) * Number(i.percent || 0)) : 0;
    const invMatch = inventory.find((x) => x.name.trim().toLowerCase() === i.name.trim().toLowerCase());
    const short = invMatch ? Number(invMatch.stock) < grams : null;
    return { ...i, grams, invMatch, short };
  });
  const totalGrams = round2(rows.reduce((s, r) => s + r.grams, 0));

  return (
    <div style={{
      background: C.card, borderRadius: 18, border: `1px solid ${C.line}`, borderTop: `4px solid ${recipe.color}`,
      padding: 26, boxShadow: "0 1px 2px rgba(63,46,46,0.04)"
    }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 16 }}>
        <input value={recipe.name} onChange={(e) => updateRecipe(recipe.id, { name: e.target.value })} style={{
          fontFamily: "'Fraunces', serif", fontWeight: 700, fontSize: 26, border: "none", outline: "none",
          background: "transparent", color: C.roseDeep, flex: 1, minWidth: 0
        }} />
        <button onClick={() => removeRecipe(recipe.id)} title="Eliminar receta" style={{
          background: "transparent", border: "none", cursor: "pointer", color: C.inkSoft, padding: 6
        }}><Trash2 size={17} /></button>
      </div>

      {(recipe.basedOn || recipe.variantNotes) && (
        <div style={{ marginTop: 10, background: C.sageSoft, borderRadius: 10, padding: "10px 14px", fontSize: 12.5, color: C.sageDeep }}>
          {recipe.basedOn && (
            <div style={{ display: "flex", alignItems: "center", gap: 6, fontWeight: 700, marginBottom: recipe.variantNotes ? 4 : 0 }}>
              <Link2 size={13} /> Basado en: {recipe.basedOn}
            </div>
          )}
          {recipe.variantNotes && <div>{recipe.variantNotes}</div>}
        </div>
      )}

      <div style={{ marginTop: 14, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
        <input value={recipe.basedOn || ""} onChange={(e) => updateRecipe(recipe.id, { basedOn: e.target.value })}
          placeholder="Basado en (opcional)"
          style={{ padding: "7px 10px", borderRadius: 8, border: `1px solid ${C.line}`, fontSize: 12.5, color: C.inkSoft }} />
        <input value={recipe.variantNotes || ""} onChange={(e) => updateRecipe(recipe.id, { variantNotes: e.target.value })}
          placeholder="Notas de variante (opcional)"
          style={{ padding: "7px 10px", borderRadius: 8, border: `1px solid ${C.line}`, fontSize: 12.5, color: C.inkSoft }} />
      </div>

      <div style={{ marginTop: 14, display: "flex", alignItems: "center", gap: 14, flexWrap: "wrap", background: C.roseSoft, borderRadius: 12, padding: "14px 18px" }}>
        <Scale size={18} color={C.roseDeep} />
        <span style={{ fontSize: 14, fontWeight: 600, color: C.roseDeep }}>{recipe.baseLabel || "Masa total deseada"}</span>
        <input type="number" value={recipe.targetMass} onChange={(e) => updateRecipe(recipe.id, { targetMass: e.target.value })} style={{
          width: 120, padding: "8px 10px", borderRadius: 8, border: `1px solid ${C.rose}`, fontSize: 15, fontWeight: 600, color: C.ink, background: "white"
        }} />
        <span style={{ fontSize: 14, color: C.roseDeep }}>g</span>
        <div style={{ marginLeft: "auto", fontSize: 13, color: C.inkSoft, fontWeight: 600 }}>Suma de %: {totalPercent}%</div>
      </div>

      <div style={{ marginTop: 18, overflowX: "auto" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 14 }}>
          <thead>
            <tr style={{ color: C.inkSoft, textAlign: "left" }}>
              <th style={{ padding: "8px 10px", fontWeight: 600 }}>Ingrediente</th>
              <th style={{ padding: "8px 10px", fontWeight: 600, width: 110 }}>%</th>
              <th style={{ padding: "8px 10px", fontWeight: 600, width: 130 }}>Cantidad</th>
              <th style={{ padding: "8px 10px", fontWeight: 600, width: 130 }}>Stock</th>
              <th style={{ width: 36 }}></th>
            </tr>
          </thead>
          <tbody>
            {rows.map((r) => (
              <tr key={r.id} className="rowhover" style={{ borderTop: `1px solid ${C.line}` }}>
                <td style={{ padding: "6px 10px" }}>
                  <input value={r.name} onChange={(e) => updateIngredient(recipe.id, r.id, { name: e.target.value })} style={{
                    border: "none", outline: "none", background: "transparent", width: "100%", fontSize: 14, color: C.ink
                  }} />
                </td>
                <td style={{ padding: "6px 10px" }}>
                  <input type="number" value={r.percent} onChange={(e) => updateIngredient(recipe.id, r.id, { percent: e.target.value })} style={{
                    border: `1px solid ${C.line}`, borderRadius: 6, padding: "5px 8px", width: 70, fontSize: 14
                  }} />
                </td>
                <td style={{ padding: "6px 10px", fontWeight: 600 }}>{r.grams} g</td>
                <td style={{ padding: "6px 10px" }}>
                  {r.invMatch ? (
                    <span style={{ display: "inline-flex", alignItems: "center", gap: 5, fontSize: 12.5, fontWeight: 600, color: r.short ? C.alert : C.sageDeep }}>
                      {r.short ? <AlertTriangle size={13} /> : <CheckCircle2 size={13} />}
                      {r.invMatch.stock} g {r.short ? "· falta" : "· ok"}
                    </span>
                  ) : (<span style={{ fontSize: 12.5, color: C.inkSoft }}>sin registrar</span>)}
                </td>
                <td>
                  <button onClick={() => removeIngredient(recipe.id, r.id)} style={{ background: "transparent", border: "none", cursor: "pointer", color: C.inkSoft }}>
                    <X size={15} />
                  </button>
                </td>
              </tr>
            ))}
          </tbody>
          <tfoot>
            <tr style={{ borderTop: `2px solid ${C.line}`, fontWeight: 700 }}>
              <td style={{ padding: "10px" }}>Total</td>
              <td style={{ padding: "10px" }}>{totalPercent}%</td>
              <td style={{ padding: "10px", color: C.roseDeep }}>{totalGrams} g</td>
              <td colSpan={2}></td>
            </tr>
          </tfoot>
        </table>
      </div>

      <button className="btn" onClick={() => addIngredient(recipe.id)} style={{
        marginTop: 10, display: "flex", alignItems: "center", gap: 6, padding: "8px 14px", borderRadius: 8,
        border: `1px solid ${C.line}`, background: "transparent", color: C.roseDeep, fontWeight: 600, fontSize: 13.5, cursor: "pointer"
      }}><Plus size={15} /> Agregar ingrediente</button>

      <p style={{ marginTop: 16, fontSize: 12.5, color: C.inkSoft, lineHeight: 1.5 }}>
        La columna "Stock" compara lo que necesitas para esta receta con tu inventario (cuando el nombre coincide).
      </p>
    </div>
  );
}

function MoldesView({ molds, addMoldRow, updateMold, removeMold, recipes, updateRecipe, onOpenPhoto }) {
  const [qty, setQty] = useState({});
  const [targetRecipeId, setTargetRecipeId] = useState(recipes[0]?.id || "");
  const sorted = [...molds].sort((a, b) => Number(a.diametro) - Number(b.diametro));
  const total = sorted.reduce((s, m) => s + (Number(qty[m.id]) || 0) * Number(m.gramos || 0), 0);

  function applyToRecipe() {
    if (!targetRecipeId || total <= 0) return;
    updateRecipe(targetRecipeId, { targetMass: round2(total) });
  }

  return (
    <div style={{ marginTop: 24, display: "grid", gridTemplateColumns: "1fr 320px", gap: 24 }}>
      <div style={{ background: C.card, borderRadius: 18, border: `1px solid ${C.line}`, padding: 26 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 10 }}>
          <h2 style={{ fontFamily: "'Fraunces', serif", fontSize: 22, color: C.roseDeep, margin: 0 }}>Tabla de moldes</h2>
          <div style={{ display: "flex", gap: 8 }}>
            <button className="btn" onClick={() => addMoldRow()} style={{
              display: "flex", alignItems: "center", gap: 6, padding: "8px 14px", borderRadius: 8, border: `1px solid ${C.line}`,
              background: "transparent", color: C.roseDeep, fontWeight: 600, fontSize: 13.5, cursor: "pointer"
            }}><Plus size={15} /> Agregar molde</button>
            <button className="btn" onClick={onOpenPhoto} style={{
              display: "flex", alignItems: "center", gap: 6, padding: "8px 14px", borderRadius: 8, border: "none",
              background: C.roseDeep, color: "white", fontWeight: 600, fontSize: 13.5, cursor: "pointer"
            }}><Camera size={15} /> Agregar por foto</button>
          </div>
        </div>

        <p style={{ fontSize: 12.5, color: C.inkSoft, marginTop: 8 }}>Diámetro del molde (cm) y cuántos gramos de masa le echas a cada uno.</p>

        <div style={{ marginTop: 14, overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 14 }}>
            <thead>
              <tr style={{ color: C.inkSoft, textAlign: "left" }}>
                <th style={{ padding: "8px 10px", fontWeight: 600 }}>Diámetro (cm)</th>
                <th style={{ padding: "8px 10px", fontWeight: 600 }}>Gramos por molde</th>
                <th style={{ padding: "8px 10px", fontWeight: 600 }}>Cantidad de moldes</th>
                <th style={{ padding: "8px 10px", fontWeight: 600 }}>Subtotal</th>
                <th style={{ width: 36 }}></th>

            <tbody>
              {sorted.map((m) => (
                <tr key={m.id} className="rowhover" style={{ borderTop: `1px solid ${C.line}` }}>
                  <td style={{ padding: "6px 10px" }}>
                    <input type="number" value={m.diametro} onChange={(e) => updateMold(m.id, { diametro: e.target.value })} style={{
                      border: `1px solid ${C.line}`, borderRadius: 6, padding: "5px 8px", width: 80, fontSize: 14
                    }} />
                  </td>
                  <td style={{ padding: "6px 10px" }}>
                    <input type="number" value={m.gramos} onChange={(e) => updateMold(m.id, { gramos: e.target.value })} style={{
                      border: `1px solid ${C.line}`, borderRadius: 6, padding: "5px 8px", width: 90, fontSize: 14
                    }} />
                  </td>
                  <td style={{ padding: "6px 10px" }}>

            marginTop: 10, width: "100%", padding: "10px", borderRadius: 8, border: "none",

function ConfiguracionView({ whatsapp, setWhatsapp, recipes, setRecipes, inventory, setInventory, molds, setMolds, apiKey, setApiKey }) {
  const [waDraft, setWaDraft] = useState(whatsapp);
  const [apiDraft, setApiDraft] = useState(apiKey);
  const [showKey, setShowKey] = useState(false);
  const [savedMsg, setSavedMsg] = useState("");
  const [resetConfirm, setResetConfirm] = useState("");
  const fileInputRef = useRef(null);

  function saveWhatsapp() { setWhatsapp(waDraft); setSavedMsg("Número guardado"); setTimeout(() => setSavedMsg(""), 2000); }
  function saveApiKey() { setApiKey(apiDraft.trim()); setSavedMsg("Clave guardada en este dispositivo"); setTimeout(() => setSavedMsg(""), 2500); }

  function downloadBackup() {
    const data = { recipes, inventory, molds, whatsapp, exportedAt: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `cuaderno-reposteria-${new Date().toISOString().slice(0, 10)}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  function restoreBackup(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (data.recipes) setRecipes(data.recipes);
        if (data.inventory) setInventory(data.inventory);
        if (data.molds) setMolds(data.molds);
        if (typeof data.whatsapp === "string") { setWhatsapp(data.whatsapp); setWaDraft(data.whatsapp); }
        setSavedMsg("Datos restaurados");
        setTimeout(() => setSavedMsg(""), 2500);
      } catch (err) {
        setSavedMsg("Ese archivo no se pudo leer");
        setTimeout(() => setSavedMsg(""), 2500);
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  function resetAll() {
    if (resetConfirm.trim().toLowerCase() !== "borrar") return;
    setRecipes(STARTER_RECIPES);
    setInventory(STARTER_INVENTORY);
    setMolds(STARTER_MOLDS);
    setWhatsapp("");
    setWaDraft("");
    setResetConfirm("");
    setSavedMsg("Datos restablecidos");
    setTimeout(() => setSavedMsg(""), 2500);
  }

  const sectionStyle = { background: C.card, borderRadius: 18, border: `1px solid ${C.line}`, padding: 24 };
  const labelStyle = { fontSize: 12.5, color: C.inkSoft, fontWeight: 600, display: "block", marginBottom: 6 };

  return (
    <div style={{ marginTop: 24, display: "flex", flexDirection: "column", gap: 18, maxWidth: 620 }}>
      {savedMsg && (
        <div style={{ background: C.sageSoft, color: C.sageDeep, borderRadius: 10, padding: "9px 14px", fontSize: 13, fontWeight: 600 }}>
          {savedMsg}
        </div>
      )}

      <div style={sectionStyle}>
        <h3 style={{ fontFamily: "'Fraunces', serif", fontSize: 19, color: C.roseDeep, margin: 0, display: "flex", alignItems: "center", gap: 8 }}>
          <Key size={17} /> Clave de la API de Claude
        </h3>
        <p style={{ fontSize: 12.5, color: C.inkSoft, lineHeight: 1.5, marginTop: 8 }}>
          Necesaria solo para "Agregar por foto". Se guarda únicamente en este dispositivo (nunca sale de tu navegador,
          salvo hacia la API de Anthropic al analizar una foto). Consíguela en{" "}
          <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener noreferrer" style={{ color: C.roseDeep }}>
            console.anthropic.com
          </a>. El uso se cobra a tu cuenta de Anthropic.
        </p>
        <label style={{ ...labelStyle, marginTop: 12 }}>Tu API key</label>
        <div style={{ display: "flex", gap: 8 }}>
          <input
            type={showKey ? "text" : "password"}
            value={apiDraft}
            onChange={(e) => setApiDraft(e.target.value)}
            placeholder="sk-ant-..."
            style={{ flex: 1, padding: "10px 12px", borderRadius: 8, border: `1px solid ${C.line}`, fontSize: 14 }}
          />
          <button className="btn" onClick={() => setShowKey(!showKey)} style={{
            padding: "0 12px", borderRadius: 8, border: `1px solid ${C.line}`, background: "transparent",
            color: C.inkSoft, fontWeight: 600, fontSize: 12.5, cursor: "pointer"
          }}>{showKey ? "Ocultar" : "Mostrar"}</button>
        </div>
        <button className="btn" onClick={saveApiKey} style={{
          marginTop: 10, padding: "9px 16px", borderRadius: 8, border: "none", background: C.roseDeep,
          color: "white", fontWeight: 600, cursor: "pointer"
        }}>Guardar clave</button>
      </div>

      <div style={sectionStyle}>
        <h3 style={{ fontFamily: "'Fraunces', serif", fontSize: 19, color: C.roseDeep, margin: 0 }}>WhatsApp</h3>
        <p style={{ fontSize: 12.5, color: C.inkSoft, lineHeight: 1.5, marginTop: 8 }}>
          Con tu número guardado, el botón "Enviar por WhatsApp" abre directo tu chat con el mensaje de insumos ya escrito.

        </p>
        <label style={{ ...labelStyle, marginTop: 12 }}>Número (con código de país)</label>

        }} />
        <button className="btn" onClick={saveWhatsapp} style={{
          marginTop: 10, padding: "9px 16px", borderRadius: 8, border: "none", background: C.roseDeep,
          color: "white", fontWeight: 600, cursor: "pointer"

      </div>

      <div style={sectionStyle}>
        <h3 style={{ fontFamily: "'Fraunces', serif", fontSize: 19, color: C.roseDeep, margin: 0 }}>Copia de seguridad</h3>
        <p style={{ fontSize: 12.5, color: C.inkSoft, lineHeight: 1.5, marginTop: 8 }}>

          Como los datos viven en este dispositivo, usa esto para pasarlos a otro celular o computadora.
        </p>
        <div style={{ display: "flex", gap: 10, marginTop: 12, flexWrap: "wrap" }}>
          <button className="btn" onClick={downloadBackup} style={{
            display: "flex", alignItems: "center", gap: 6, padding: "9px 16px", borderRadius: 8, border: "none",
            background: C.roseDeep, color: "white", fontWeight: 600, cursor: "pointer"
          }}><Download size={15} /> Descargar copia</button>
          <button className="btn" onClick={() => fileInputRef.current?.click()} style={{
            display: "flex", alignItems: "center", gap: 6, padding: "9px 16px", borderRadius: 8, border: `1px solid ${C.line}`,
            background: "transparent", color: C.roseDeep, fontWeight: 600, cursor: "pointer"
          }}><Upload size={15} /> Restaurar desde archivo</button>
          <input ref={fileInputRef} type="file" accept="application/json" onChange={restoreBackup} style={{ display: "none" }} />
        </div>
      </div>

      <div style={{ ...sectionStyle, borderColor: `${C.alert}55` }}>
        <h3 style={{ fontFamily: "'Fraunces', serif", fontSize: 19, color: C.alert, margin: 0 }}>Restablecer datos</h3>
        <p style={{ fontSize: 12.5, color: C.inkSoft, lineHeight: 1.5, marginTop: 8 }}>
          Esto borra tus recetas, moldes e inventario actuales (en este dispositivo) y vuelve a dejar los datos de ejemplo.
          Escribe <b>borrar</b> para confirmar.
        </p>
        <div style={{ display: "flex", gap: 10, marginTop: 10 }}>
          <input value={resetConfirm} onChange={(e) => setResetConfirm(e.target.value)} placeholder="borrar" style={{
            padding: "9px 12px", borderRadius: 8, border: `1px solid ${C.line}`, fontSize: 14, flex: 1
          }} />
          <button className="btn" onClick={resetAll} disabled={resetConfirm.trim().toLowerCase() !== "borrar"} style={{
            display: "flex", alignItems: "center", gap: 6, padding: "9px 16px", borderRadius: 8, border: "none",
            background: resetConfirm.trim().toLowerCase() === "borrar" ? C.alert : C.line, color: "white",
            fontWeight: 600, cursor: resetConfirm.trim().toLowerCase() === "borrar" ? "pointer" : "not-allowed"
          }}><RotateCcw size={15} /> Restablecer</button>
        </div>
      </div>
    </div>
  );
}

// =========================================================
// IMPORTAR POR FOTO (usa tu API key para llamar a la API de Claude)
// =========================================================
function PhotoImportModal({ mode, apiKey, onClose, onAddRecipe, onAddMolds, onGoToSettings }) {
  const [file, setFile] = useState(null);
  const [preview, setPreview] = useState(null);
  const [status, setStatus] = useState("idle");
  const [error, setError] = useState("");
  const [recipeResult, setRecipeResult] = useState(null);
  const [moldResult, setMoldResult] = useState(null);

  function handleFile(e) {
    const f = e.target.files[0];
    if (!f) return;
    setFile(f);
    setStatus("idle");
    setError("");
    const reader = new FileReader();
    reader.onload = () => setPreview(reader.result);
    reader.readAsDataURL(f);
  }

  async function analyze() {
    if (!file) return;
    if (!apiKey) { setError("Primero configura tu API key en Configuración."); return; }
    setStatus("analyzing");
    setError("");
    try {
      const base64 = await new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result.split(",")[1]);
        r.onerror = () => rej(new Error("No se pudo leer la imagen"));
        r.readAsDataURL(file);
      });
      const mediaType = file.type || "image/jpeg";
      const instructions = mode === "receta"
        ? `Analiza esta foto de una receta de repostería o panadería (puede estar escrita a mano o impresa, con ingredientes y sus porcentajes o cantidades). Responde SOLO con un JSON válido, sin texto adicional ni bloques de código, con exactamente esta forma: {"name": "nombre de la receta", "baseLabel": "Masa total deseada", "targetMass": numero, "ingredients": [{"name": "nombre", "percent": numero}]}. Si la receta usa la harina como base 100% en vez de masa total, usa baseLabel "Cantidad de harina". Usa los números tal como aparecen en la imagen, no inventes datos que no veas.`
        : `Analiza esta foto de una tabla o lista de moldes de repostería con su diámetro y la cantidad de masa (en gramos) que lleva cada uno. Responde SOLO con un JSON válido, sin texto adicional ni bloques de código, con exactamente esta forma: {"moldes": [{"diametro": numero, "gramos": numero}]}. Usa los números tal como aparecen en la imagen, no inventes datos que no veas.`;

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 1000,
          messages: [{
            role: "user",
            content: [
              { type: "image", source: { type: "base64", media_type: mediaType, data: base64 } },
              { type: "text", text: instructions },
            ],
          }],
        }),
      });
      const data = await response.json();
      if (!response.ok) {
        throw new Error(data?.error?.message || "La API rechazó la solicitud");
      }
      const text = (data.content || []).map((b) => b.text || "").join("\n");
      const clean = text.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(clean);

      if (mode === "receta") {
        setRecipeResult({
          name: parsed.name || "Receta sin nombre",
          baseLabel: parsed.baseLabel || "Masa total deseada",
          targetMass: Number(parsed.targetMass) || 0,
          ingredients: (parsed.ingredients || []).map((i) => ({ id: uid(), name: i.name || "Ingrediente", percent: Number(i.percent) || 0 })),
        });
      } else {
        setMoldResult((parsed.moldes || []).map((m) => ({ id: uid(), diametro: Number(m.diametro) || 0, gramos: Number(m.gramos) || 0 })));
      }
      setStatus("done");
    } catch (e) {
      console.error(e);
      setError(e.message === "La API rechazó la solicitud" || e.message?.includes("credit") || e.message?.includes("key")
        ? `No se pudo leer la foto: ${e.message}`
        : "No pude leer bien la foto. Prueba con una imagen más clara o mejor iluminada.");
      setStatus("error");
    }
  }

  return (
    <div onClick={onClose} style={{
      position: "fixed", inset: 0, background: "rgba(63,46,46,0.4)", display: "flex", alignItems: "center",
      justifyContent: "center", padding: 20, zIndex: 60
    }}>
      <div onClick={(e) => e.stopPropagation()} style={{
        background: "white", borderRadius: 18, padding: 26, width: 520, maxWidth: "100%", maxHeight: "85vh", overflowY: "auto"
      }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <h3 style={{ fontFamily: "'Fraunces', serif", fontSize: 21, color: C.roseDeep, margin: 0, display: "flex", alignItems: "center", gap: 8 }}>
            <Camera size={19} /> {mode === "receta" ? "Agregar receta por foto" : "Agregar moldes por foto"}
          </h3>
          <button onClick={onClose} style={{ background: "transparent", border: "none", cursor: "pointer", color: C.inkSoft }}>
            <X size={19} />
          </button>
        </div>

        {!apiKey && !recipeResult && !moldResult && (
          <div style={{ marginTop: 14, background: C.alertSoft, borderRadius: 10, padding: "12px 14px" }}>
            <p style={{ fontSize: 13, color: C.alert, margin: 0, lineHeight: 1.5 }}>
              Falta tu API key de Claude para usar esta función.
            </p>
            <button className="btn" onClick={onGoToSettings} style={{
              marginTop: 10, padding: "8px 14px", borderRadius: 8, border: "none", background: C.alert,
              color: "white", fontWeight: 600, fontSize: 13, cursor: "pointer"
            }}>Ir a Configuración</button>
          </div>
        )}

        {!recipeResult && !moldResult && (
          <>
            <p style={{ fontSize: 13, color: C.inkSoft, lineHeight: 1.5, marginTop: 10 }}>
              Toma una foto o sube una imagen {mode === "receta" ? "de tu receta" : "de tu tabla de moldes"}.
              La leo y armo los datos automáticamente para que los revises antes de agregarlos.
            </p>
            <label style={{
              marginTop: 14, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
              gap: 8, border: `2px dashed ${C.rose}`, borderRadius: 12, padding: "28px 16px", cursor: "pointer",
              background: C.roseSoft
            }}>
              <Camera size={26} color={C.roseDeep} />
              <span style={{ fontSize: 13.5, fontWeight: 600, color: C.roseDeep }}>Tomar foto o elegir de la galería</span>
              <input type="file" accept="image/*" capture="environment" onChange={handleFile} style={{ display: "none" }} />
            </label>

            {preview && (
              <div style={{ marginTop: 14 }}>
                <img src={preview} alt="preview" style={{ width: "100%", maxHeight: 220, objectFit: "contain", borderRadius: 10, border: `1px solid ${C.line}` }} />
                <button className="btn" onClick={analyze} disabled={status === "analyzing"} style={{
                  marginTop: 12, width: "100%", display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
                  padding: "11px", borderRadius: 10, border: "none", background: C.roseDeep, color: "white",
                  fontWeight: 600, cursor: status === "analyzing" ? "wait" : "pointer"
                }}>
                  {status === "analyzing" ? <><Loader2 size={16} className="spin" /> Leyendo la foto…</> : <><Sparkles size={16} /> Analizar foto</>}
                </button>
              </div>
            )}
            {error && <p style={{ color: C.alert, fontSize: 13, marginTop: 10 }}>{error}</p>}
          </>
        )}

        {recipeResult && (
          <div style={{ marginTop: 14 }}>
            <p style={{ fontSize: 12.5, color: C.inkSoft }}>Revisa y corrige antes de agregar:</p>
            <label style={{ fontSize: 12, color: C.inkSoft, fontWeight: 600 }}>Nombre</label>
            <input value={recipeResult.name} onChange={(e) => setRecipeResult({ ...recipeResult, name: e.target.value })} style={{
              width: "100%", padding: "8px 10px", borderRadius: 8, border: `1px solid ${C.line}`, fontSize: 14, marginTop: 4, marginBottom: 10
            }} />
            <div style={{ display: "flex", gap: 10 }}>
              <div style={{ flex: 1 }}>
                <label style={{ fontSize: 12, color: C.inkSoft, fontWeight: 600 }}>Base</label>
                <select value={recipeResult.baseLabel} onChange={(e) => setRecipeResult({ ...recipeResult, baseLabel: e.target.value })} style={{
                  width: "100%", padding: "8px 10px", borderRadius: 8, border: `1px solid ${C.line}`, fontSize: 13.5, marginTop: 4
                }}>
                  <option>Masa total deseada</option>
                  <option>Cantidad de harina</option>
                </select>
              </div>
              <div style={{ width: 140 }}>
                <label style={{ fontSize: 12, color: C.inkSoft, fontWeight: 600 }}>Cantidad (g)</label>
                <input type="number" value={recipeResult.targetMass} onChange={(e) => setRecipeResult({ ...recipeResult, targetMass: e.target.value })} style={{
                  width: "100%", padding: "8px 10px", borderRadius: 8, border: `1px solid ${C.line}`, fontSize: 13.5, marginTop: 4
                }} />
              </div>
            </div>

            <div style={{ marginTop: 14 }}>
              {recipeResult.ingredients.map((i, idx) => (
                <div key={i.id} style={{ display: "flex", gap: 8, marginBottom: 6 }}>
                  <input value={i.name} onChange={(e) => {
                    const next = [...recipeResult.ingredients]; next[idx] = { ...i, name: e.target.value };
                    setRecipeResult({ ...recipeResult, ingredients: next });
                  }} style={{ flex: 1, padding: "7px 9px", borderRadius: 6, border: `1px solid ${C.line}`, fontSize: 13.5 }} />
                  <input type="number" value={i.percent} onChange={(e) => {
                    const next = [...recipeResult.ingredients]; next[idx] = { ...i, percent: e.target.value };
                    setRecipeResult({ ...recipeResult, ingredients: next });
                  }} style={{ width: 80, padding: "7px 9px", borderRadius: 6, border: `1px solid ${C.line}`, fontSize: 13.5 }} />
                  <button onClick={() => {
                    setRecipeResult({ ...recipeResult, ingredients: recipeResult.ingredients.filter((x) => x.id !== i.id) });
                  }} style={{ background: "transparent", border: "none", cursor: "pointer", color: C.inkSoft }}>
                    <X size={15} />
                  </button>
                </div>
              ))}
              <button className="btn" onClick={() => setRecipeResult({ ...recipeResult, ingredients: [...recipeResult.ingredients, { id: uid(), name: "", percent: 0 }] })} style={{
                display: "flex", alignItems: "center", gap: 6, padding: "6px 10px", borderRadius: 6, border: `1px solid ${C.line}`,
                background: "transparent", color: C.roseDeep, fontWeight: 600, fontSize: 12.5, cursor: "pointer", marginTop: 4
              }}><Plus size={13} /> Agregar ingrediente</button>
            </div>

            <button className="btn" onClick={() => onAddRecipe(recipeResult)} style={{
              marginTop: 16, width: "100%", padding: "11px", borderRadius: 10, border: "none", background: C.roseDeep,
              color: "white", fontWeight: 600, cursor: "pointer"
            }}>Agregar a mis recetas</button>
          </div>
        )}

        {moldResult && (
          <div style={{ marginTop: 14 }}>
            <p style={{ fontSize: 12.5, color: C.inkSoft }}>Revisa y corrige antes de agregar:</p>
            {moldResult.map((m, idx) => (
              <div key={m.id} style={{ display: "flex", gap: 8, marginBottom: 6, alignItems: "center" }}>
                <input type="number" value={m.diametro} onChange={(e) => {
                  const next = [...moldResult]; next[idx] = { ...m, diametro: e.target.value }; setMoldResult(next);
                }} placeholder="Diámetro" style={{ flex: 1, padding: "7px 9px", borderRadius: 6, border: `1px solid ${C.line}`, fontSize: 13.5 }} />
                <span style={{ fontSize: 12.5, color: C.inkSoft }}>cm →</span>
                <input type="number" value={m.gramos} onChange={(e) => {
                  const next = [...moldResult]; next[idx] = { ...m, gramos: e.target.value }; setMoldResult(next);
                }} placeholder="Gramos" style={{ flex: 1, padding: "7px 9px", borderRadius: 6, border: `1px solid ${C.line}`, fontSize: 13.5 }} />
                <span style={{ fontSize: 12.5, color: C.inkSoft }}>g</span>
                <button onClick={() => setMoldResult(moldResult.filter((x) => x.id !== m.id))} style={{ background: "transparent", border: "none", cursor: "pointer", color: C.inkSoft }}>
                  <X size={15} />
                </button>
              </div>
            ))}
            <button className="btn" onClick={() => setMoldResult([...moldResult, { id: uid(), diametro: 0, gramos: 0 }])} style={{
              display: "flex", alignItems: "center", gap: 6, padding: "6px 10px", borderRadius: 6, border: `1px solid ${C.line}`,
              background: "transparent", color: C.roseDeep, fontWeight: 600, fontSize: 12.5, cursor: "pointer", marginTop: 4
            }}><Plus size={13} /> Agregar fila</button>

            <button className="btn" onClick={() => onAddMolds(moldResult)} style={{
              marginTop: 16, width: "100%", padding: "11px", borderRadius: 10, border: "none", background: C.roseDeep,
              color: "white", fontWeight: 600, cursor: "pointer"
            }}>Agregar a mi tabla de moldes</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ---------- Red de seguridad de React ----------
// Si algo dentro de la app lanza un error de renderizado, React 18
// desmontaría todo el árbol y dejaría la pantalla en blanco. Este
// ErrorBoundary lo evita mostrando un mensaje claro con botón para
// reintentar, en vez de una pantalla vacía.
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { error: null };
  }
  static getDerivedStateFromError(error) {
    return { error };
  }
  componentDidCatch(error, info) {
    console.error("Error atrapado por ErrorBoundary:", error, info);
  }
  render() {
    if (this.state.error) {
      return (
        <div style={{ maxWidth: 560, margin: "60px auto", padding: 24, fontFamily: "sans-serif", textAlign: "center", color: C.ink }}>
          <h2 style={{ color: C.roseDeep, marginBottom: 8 }}>Algo salió mal</h2>
          <p style={{ color: C.inkSoft, fontSize: 14, lineHeight: 1.5 }}>
            La app encontró un error inesperado. Tus datos guardados no se perdieron.
          </p>
          <pre style={{
            textAlign: "left", background: C.roseSoft, color: C.roseDeep, padding: 12, borderRadius: 8,
            fontSize: 12, overflow: "auto", marginTop: 14
          }}>{String(this.state.error && this.state.error.message || this.state.error)}</pre>
          <button onClick={() => location.reload()} style={{
            marginTop: 14, padding: "10px 18px", border: "none", borderRadius: 8, background: C.roseDeep,
            color: "white", fontWeight: 600, cursor: "pointer"
          }}>Reintentar</button>
        </div>
      );
    }
    return this.props.children;
  }
}

const root = createRoot(document.getElementById("root"));
root.render(
  <ErrorBoundary>
    <App />
  </ErrorBoundary>
);
</script>
